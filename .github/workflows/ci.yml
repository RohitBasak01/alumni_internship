name: CI/CD Pipeline

on:
  push:
    branches: ["main", "develop"]
    tags: ["v*"]
  pull_request:
    branches: ["**"]

jobs:
  # Backend testing and building
  backend:
    name: Backend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run unit tests
        run: npm test -- --coverage --passWithNoTests

      - name: Upload test coverage
        uses: codecov/codecov-action@v4
        with:
          directory: backend/coverage
          flags: backend
          name: backend-coverage

      - name: Build Docker image
        run: docker build -t alumni-backend:latest .

      - name: Test Docker health check
        run: |
          docker run -d --name test-backend -p 5000:5000 \
            -e NODE_ENV=test \
            -e CENTRAL_MONGODB_URI=mongodb://test:test@localhost:27017/test \
            -e JWT_SECRET=test-secret \
            alumni-backend:latest
          sleep 10
          curl -f http://localhost:5000/health || exit 1
          docker stop test-backend && docker rm test-backend

  # Frontend testing and building
  frontend:
    name: Frontend build & test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npx eslint . --max-warnings=0

      - name: Run unit tests
        run: npm test -- --run --passWithNoTests

      - name: Build application
        run: npm run build

      - name: Build Docker image
        run: docker build -t alumni-frontend:latest .

      - name: Test Docker health check
        run: |
          docker run -d --name test-frontend -p 8080:80 alumni-frontend:latest
          sleep 5
          curl -f http://localhost:8080/health || exit 1
          docker stop test-frontend && docker rm test-frontend

  # Integration tests (requires MongoDB)
  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    defaults:
      run:
        working-directory: backend
    services:
      mongodb:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand(\"ping\")'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        env:
          CENTRAL_MONGODB_URI: mongodb://localhost:27017/alumni-test
          JWT_SECRET: test-integration-secret-123
          NODE_ENV: test
        run: |
          npm test -- --testPathPattern="integration" --testTimeout=10000

  # Docker build and push to registry (on main branch or tags)
  docker-push:
    name: Build and push Docker images
    runs-on: ubuntu-latest
    needs: [backend, frontend, integration-tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ secrets.DOCKER_USERNAME }}/alumni-backend
            ${{ secrets.DOCKER_USERNAME }}/alumni-frontend
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/alumni-backend:latest,${{ secrets.DOCKER_USERNAME }}/alumni-backend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/alumni-frontend:latest,${{ secrets.DOCKER_USERNAME }}/alumni-frontend:${{ github.sha }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Deploy to staging (on develop branch)
  deploy-staging:
    name: Deploy to staging
    runs-on: ubuntu-latest
    needs: [docker-push]
    if: github.event_name == 'push' && github.ref == 'refs/heads/develop'
    environment:
      name: staging
      url: https://staging.alumni-network.example.com
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to staging
        run: |
          echo "Deploying to staging environment..."
          # Add your deployment commands here
          # Example: ssh, kubectl, docker-compose, etc.
          echo "Deployment would happen here with proper credentials"

  # Security scanning
  security-scan:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: "trivy-results.sarif"
